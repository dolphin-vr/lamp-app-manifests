{{- if .Values.phpmyadmin.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: phpmyadmin
  namespace: {{ .Values.namespace }}
  labels:
    app: phpmyadmin
    tier: admin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: phpmyadmin
      tier: admin
  template:
    metadata:
      labels:
        app: phpmyadmin
        tier: admin
    spec:
      containers:
      - name: phpmyadmin
        image: {{ .Values.phpmyadmin.image }}
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
          name: http
        env:
        # Point phpMyAdmin to the MySQL ClusterIP service
        - name: PMA_HOST
          value: mysql-service
        - name: PMA_PORT
          value: "3306"
        # cookie auth — user enters credentials on every login
        - name: PMA_AUTH_TYPE
          value: cookie
        # Disable arbitrary server input for security
        - name: PMA_ARBITRARY
          value: "0"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 20
          periodSeconds: 15
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
        resources:
          requests:
            memory: {{ .Values.phpmyadmin.resources.requests.memory }}
            cpu: {{ .Values.phpmyadmin.resources.requests.cpu }}
          limits:
            memory: {{ .Values.phpmyadmin.resources.limits.memory }}
            cpu: {{ .Values.phpmyadmin.resources.limits.cpu }}
{{- end }}
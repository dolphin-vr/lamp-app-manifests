{{- if .Values.ingress.enabled }}
---
# Middleware: redirect all HTTP traffic to HTTPS
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-https
  namespace: {{ .Values.namespace }}
spec:
  redirectScheme:
    scheme: https
    permanent: true

---
# HTTP IngressRoute for the main app (redirects to HTTPS)
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: lamp-ingressroute-http
  namespace: {{ .Values.namespace }}
  labels:
    app: lamp-app
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`{{ .Values.ingress.host }}`)
      kind: Rule
      services:
        - name: apache-service
          port: 80
      middlewares:
        - name: redirect-https

---
# HTTPS IngressRoute for the main app
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: lamp-ingressroute-https
  namespace: {{ .Values.namespace }}
  labels:
    app: lamp-app
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`{{ .Values.ingress.host }}`)
      kind: Rule
      services:
        - name: apache-service
          port: 80
  {{- if .Values.ingress.tls.enabled }}
  tls:
    secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}

{{- if .Values.phpmyadmin.enabled }}
---
# HTTP IngressRoute for phpMyAdmin (redirects to HTTPS)
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: phpmyadmin-ingressroute-http
  namespace: {{ .Values.namespace }}
  labels:
    app: phpmyadmin
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`{{ .Values.phpmyadmin.host }}`)
      kind: Rule
      services:
        - name: phpmyadmin-service
          port: 80
      middlewares:
        - name: redirect-https

---
# HTTPS IngressRoute for phpMyAdmin
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: phpmyadmin-ingressroute-https
  namespace: {{ .Values.namespace }}
  labels:
    app: phpmyadmin
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`{{ .Values.phpmyadmin.host }}`)
      kind: Rule
      services:
        - name: phpmyadmin-service
          port: 80
  {{- if .Values.ingress.tls.enabled }}
  tls:
    secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
{{- end }}

{{- end }}
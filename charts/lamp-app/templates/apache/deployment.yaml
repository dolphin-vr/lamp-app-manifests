apiVersion: apps/v1
kind: Deployment
metadata:
  name: apache
  namespace: {{ .Values.namespace }}
  labels:
    app: apache
    tier: frontend
spec:
  replicas: {{ .Values.apache.replicas }}
  selector:
    matchLabels:
      app: apache
      tier: frontend
  template:
    metadata:
      labels:
        app: apache
        tier: frontend
    spec:
      containers:
      - name: apache
        image: {{ .Values.images.registry }}/apache:{{ .Values.images.apacheTag }}
        imagePullPolicy: {{ .Values.images.pullPolicy }}
        ports:
        - containerPort: 80
          name: http
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
        resources:
          requests:
            memory: {{ .Values.apache.resources.requests.memory }}
            cpu: {{ .Values.apache.resources.requests.cpu }}
          limits:
            memory: {{ .Values.apache.resources.limits.memory }}
            cpu: {{ .Values.apache.resources.limits.cpu }}
      imagePullSecrets:
      - name: ghcr-secret
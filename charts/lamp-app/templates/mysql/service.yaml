# Headless service for StatefulSet (important for stable network ID)
apiVersion: v1
kind: Service
metadata:
  name: mysql-headless
  namespace: {{ .Values.namespace }}
  labels:
    app: mysql
    tier: database
spec:
  clusterIP: None  # Headless
  ports:
  - port: 3306
    targetPort: 3306
    protocol: TCP
    name: mysql
  selector:
    app: mysql
    tier: database
---
# Regular service for accessing MySQL
apiVersion: v1
kind: Service
metadata:
  name: mysql-service
  namespace: {{ .Values.namespace }}
  labels:
    app: mysql
    tier: database
spec:
  type: ClusterIP
  ports:
  - port: 3306
    targetPort: 3306
    protocol: TCP
    name: mysql
  selector:
    app: mysql
    tier: database
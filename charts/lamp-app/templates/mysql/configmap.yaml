apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-init-scripts
  namespace: {{ .Values.namespace }}
data:
  02-grant-user.sh: |
    #!/bin/bash
    # Explicitly grant access from any host — needed because PHP-FPM runs
    # in a sidecar pod with a dynamic cluster IP, not on localhost
    mysql -u root -p"${MYSQL_ROOT_PASSWORD}" <<EOF
    GRANT ALL PRIVILEGES ON ${MYSQL_DATABASE}.* TO '${MYSQL_USER}'@'%' IDENTIFIED BY '${MYSQL_PASSWORD}';
    FLUSH PRIVILEGES;
    EOF
  01-init-database.sql: |
    -- Create database and use it
    CREATE DATABASE IF NOT EXISTS {{ .Values.mysql.database }} 
      CHARACTER SET utf8mb4 
      COLLATE utf8mb4_unicode_ci;
    
    USE {{ .Values.mysql.database }};
    
    -- Drop existing tables (порядок важливий через foreign keys)
    DROP TABLE IF EXISTS Rating;
    DROP TABLE IF EXISTS Movie;
    DROP TABLE IF EXISTS Reviewer;
    
    -- Create Movie table
    CREATE TABLE Movie (
      mID INT NOT NULL AUTO_INCREMENT,
      title VARCHAR(255) NOT NULL,
      year INT NOT NULL,
      director VARCHAR(255) NOT NULL,
      PRIMARY KEY (mID)
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4 COLLATE=utf8mb4_unicode_ci;
    
    -- Create Reviewer table
    CREATE TABLE Reviewer (
      rID INT NOT NULL,
      name VARCHAR(255) NOT NULL,
      PRIMARY KEY (rID)
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4 COLLATE=utf8mb4_unicode_ci;
    
    -- Create Rating table with foreign keys
    CREATE TABLE Rating (
      ratingID INT NOT NULL AUTO_INCREMENT,
      rID INT NOT NULL,
      mID INT NOT NULL,
      stars INT NOT NULL,
      ratingDate DATE DEFAULT NULL,
      PRIMARY KEY (ratingID),
      KEY fk_rating_movie (mID),
      KEY fk_rating_reviewer (rID),
      CONSTRAINT fk_rating_movie 
        FOREIGN KEY (mID) REFERENCES Movie (mID) ON DELETE CASCADE,
      CONSTRAINT fk_rating_reviewer 
        FOREIGN KEY (rID) REFERENCES Reviewer (rID) ON DELETE CASCADE,
      CONSTRAINT Rating_chk_1 CHECK (stars BETWEEN 1 AND 5)
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4 COLLATE=utf8mb4_unicode_ci;
    
    -- Insert Movies
    INSERT INTO Movie (mID, title, year, director) VALUES
